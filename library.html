<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Orchidarium · Biblioteca consultable</title>
<style>
:root{--bg:#f7f3ea;--paper:#fffdf8;--ink:#22231f;--muted:#66685f;--green:#2e5d42;--pink:#ad3d5b;--line:#d9d2c5}*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:var(--bg);color:var(--ink)}header{padding:28px 20px 12px;max-width:980px;margin:auto}h1{margin:0 0 8px;font-family:Georgia,serif;font-size:clamp(32px,6vw,56px);font-weight:500}header p{margin:0;color:var(--muted);line-height:1.5}.toolbar{max-width:980px;margin:20px auto;padding:0 20px;display:grid;grid-template-columns:1fr 190px;gap:10px}.toolbar input,.toolbar select{width:100%;padding:14px 16px;border:1px solid var(--line);border-radius:14px;background:var(--paper);font-size:16px}.summary{max-width:980px;margin:0 auto 14px;padding:0 20px;color:var(--muted);font-size:14px}.grid{max-width:980px;margin:auto;padding:0 20px 40px;display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}.card{background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:0 10px 25px rgba(0,0,0,.035)}.card h2{font:500 24px/1.1 Georgia,serif;margin:0 0 6px}.authority{color:var(--muted);font-size:13px}.countries{margin:12px 0}.pill{display:inline-block;background:#e6efe8;color:var(--green);padding:5px 9px;border-radius:999px;margin:0 5px 5px 0;font-size:12px}.notes{color:#484a44;line-height:1.45;font-size:14px}.links{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}.links a{color:var(--pink);text-decoration:none;font-size:13px;font-weight:600}.notice{max-width:980px;margin:0 auto 20px;padding:0 20px}.notice div{background:#fff4d9;border:1px solid #e4cf95;border-radius:14px;padding:12px 14px;color:#67551d;font-size:13px;line-height:1.4}.empty{grid-column:1/-1;padding:40px;text-align:center;color:var(--muted)}@media(max-width:640px){.toolbar{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <h1>Biblioteca Orchidarium</h1>
  <p>Primera base consultable de especies de <em>Cattleya</em>. Busca por nombre, país, sinónimo histórico o término relacionado.</p>
</header>
<div class="notice"><div id="notice">Cargando catálogo…</div></div>
<div class="toolbar">
  <input id="q" type="search" placeholder="Ej. trianae, Colombia, aurea, Venezuela…" autocomplete="off">
  <select id="country"><option value="">Todos los países</option></select>
</div>
<div class="summary" id="summary"></div>
<main class="grid" id="grid"></main>
<script>
const state={records:[],filtered:[]};
const normalize=s=>(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
function searchable(r){return normalize([r.scientificName,r.authorship,...(r.commonNames||[]),...(r.countries||[]),...(r.searchTerms||[]),r.notes].join(' '));}
function render(){
 const q=normalize(document.querySelector('#q').value.trim());
 const country=document.querySelector('#country').value;
 state.filtered=state.records.filter(r=>(!q||searchable(r).includes(q))&&(!country||(r.countries||[]).includes(country)));
 document.querySelector('#summary').textContent=`${state.filtered.length} de ${state.records.length} registros`;
 const grid=document.querySelector('#grid');
 if(!state.filtered.length){grid.innerHTML='<div class="empty">No se encontraron coincidencias.</div>';return;}
 grid.innerHTML=state.filtered.map(r=>`<article class="card">
   <h2><em>${r.scientificName}</em></h2>
   <div class="authority">${r.authorship||''}</div>
   <div class="countries">${(r.countries||[]).map(c=>`<span class="pill">${c}</span>`).join('')}</div>
   <div class="notes">${r.notes||''}</div>
   <div class="links">
     ${r.links?.powo?`<a href="${r.links.powo}" target="_blank" rel="noopener">Kew POWO ↗</a>`:''}
     ${r.links?.gbif?`<a href="${r.links.gbif}" target="_blank" rel="noopener">GBIF ↗</a>`:''}
     ${r.links?.ipni?`<a href="${r.links.ipni}" target="_blank" rel="noopener">IPNI ↗</a>`:''}
   </div>
 </article>`).join('');
}
fetch('./data/cattleya_seed.json').then(r=>{if(!r.ok)throw new Error('No se pudo abrir el catálogo');return r.json()}).then(data=>{
 state.records=data.records||[];
 const countries=[...new Set(state.records.flatMap(r=>r.countries||[]))].sort((a,b)=>a.localeCompare(b,'es'));
 document.querySelector('#country').innerHTML='<option value="">Todos los países</option>'+countries.map(c=>`<option>${c}</option>`).join('');
 document.querySelector('#notice').textContent=data.metadata?.notice||'Catálogo inicial sujeto a verificación.';
 render();
}).catch(err=>{document.querySelector('#notice').textContent=err.message;document.querySelector('#grid').innerHTML='<div class="empty">No fue posible cargar los datos.</div>'});
document.querySelector('#q').addEventListener('input',render);
document.querySelector('#country').addEventListener('change',render);
</script>
</body>
</html>
